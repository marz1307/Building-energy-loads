name: R-CMD-check

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

jobs:
  R-CMD-check:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        r-version: ['4.3', '4.4']

    steps:
      - uses: actions/checkout@v4

      - uses: r-lib/actions/setup-r@v2
        with:
          r-version: ${{ matrix.r-version }}
          use-public-rspm: true

      - uses: r-lib/actions/setup-r-dependencies@v2
        with:
          extra-packages: |
            any::rcmdcheck
            any::lintr
            any::testthat

      - name: Lint R, analysis, tests
        run: |
          Rscript -e 'lints <- c(lintr::lint_dir("R"), lintr::lint_dir("analysis"), lintr::lint_dir("tests")); if (length(lints) > 0) { print(lints); quit(status = 1) }'

      - name: Run tests
        run: Rscript -e 'testthat::test_dir("tests/testthat", reporter = "summary", stop_on_failure = TRUE)'
